<!DOCTYPE html>
<html>
<head>
  <title>Plinko Pro</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body style="margin:0;background:#0f0f1a;">
<script>
const socket = io();

const config = {
  type: Phaser.AUTO,
  width: 1920,
  height: 1080,
  physics: {
    default: 'matter',
    matter: { gravity: { y: 1 } }
  },
  scene: {
    create: create
  }
};

const game = new Phaser.Game(config);

function create() {
    socket.on("drop", (data) => {
        const ball = this.matter.add.circle(960, 50, 10);
        ball.setBounce(0.9);
    });
}
</script>
</body>
</html>
